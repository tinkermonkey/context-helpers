server:
  host: 0.0.0.0
  port: 7123
  api_key: "change-me"          # Required: Bearer token for all requests

collectors:
  reminders:
    enabled: true
    list_filter: null             # null = all lists
    page_size: 200                # Items fetched per page (default 200)

  health:
    enabled: false
    export_watch_dir: ~/Downloads # healthkit-to-sqlite processes Health.zip exports here

  imessage:
    enabled: true
    db_path: ~/Library/Messages/chat.db

  notes:
    enabled: false
    db_path: ~/Library/Group Containers/group.com.apple.notes/NoteStore.sqlite

  music:
    enabled: false

  filesystem:
    enabled: false
    directory: ~/Documents        # directory to watch for text files
    extensions: []                # empty = all readable text files; non-empty = explicit allowlist (e.g. [.md, .txt])
    max_file_size_mb: 1.0         # files larger than this are skipped before reading
    page_size: 50                 # max files per push-trigger delivery cycle
    max_response_mb: 10.0         # max total content bytes per page (soft limit)

  obsidian:
    enabled: false
    vault_path: ~/Documents/Obsidian  # path to your Obsidian vault

  oura:
    enabled: false
    # Register an OAuth2 app at https://cloud.ouraring.com/oauth/applications
    # then run the server-side flow to get your initial access_token + refresh_token.
    # After the first successful refresh, tokens are stored automatically in
    # ~/.local/share/context-helpers/oura_tokens.json and the config values are ignored.
    client_id: ""
    client_secret: ""
    access_token: ""   # initial access token (seed only)
    refresh_token: ""  # initial refresh token (seed only)
    # base_url: "https://api.ouraring.com/v2"      # override for testing only
    # token_url: "https://api.ouraring.com/oauth/token"  # override for testing only

push:
  enabled: false
  library_url: "http://server-ip:8000"  # URL of context-library server
  library_secret: ""                     # Must match CTX_WEBHOOK_SECRET on context-library
  poll_interval: 60                      # Seconds between polling cycles for non-file sources
